name: Geo Ring Cloud governance

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: geo-ring-cloud-governance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lightweight-quality-gate:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run deterministic checks
        run: python _GEO_RING_CLOUD_INDEX/ci_check.py
